<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS Ecosystem — Login</title>
  <meta name="description" content="Secure gateway to enterprise tools - SaaS Ecosystem Login" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #0d1224;
      --bg-card: rgba(15, 20, 40, 0.85);
      --bg-input: rgba(10, 15, 30, 0.9);
      --border-subtle: rgba(55, 70, 120, 0.35);
      --border-focus: rgba(100, 130, 255, 0.5);
      --text-primary: #e8ecf4;
      --text-secondary: #8090b5;
      --text-muted: #5a6a8a;
      --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
      --accent-blue: #6366f1;
      --accent-purple: #8b5cf6;
      --accent-cyan: #22d3ee;
      --glow-primary: rgba(99, 102, 241, 0.15);
      --glow-purple: rgba(139, 92, 246, 0.1);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(99, 102, 241, 0.12), transparent),
        radial-gradient(ellipse 60% 50% at 80% 50%, rgba(139, 92, 246, 0.08), transparent),
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(34, 211, 238, 0.06), transparent);
      z-index: 0;
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      0% { opacity: 0.7; }
      100% { opacity: 1; }
    }

    /* Floating grid dots */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(99, 102, 241, 0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 0 20px;
    }

    /* Header */
    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .login-header .subtitle {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Card */
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 36px 32px;
      backdrop-filter: blur(20px);
      box-shadow:
        0 4px 30px rgba(0, 0, 0, 0.3),
        0 0 60px var(--glow-primary),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    /* OAuth buttons */
    .oauth-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .oauth-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      background: rgba(20, 25, 50, 0.6);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .oauth-btn:hover {
      border-color: var(--border-focus);
      background: rgba(30, 35, 65, 0.7);
      color: var(--text-primary);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px var(--glow-primary);
    }

    .oauth-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-subtle);
    }

    .divider span {
      padding: 0 16px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .form-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .forgot-link {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot-link:hover {
      color: var(--accent-blue);
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      pointer-events: none;
    }

    .input-icon svg {
      width: 18px;
      height: 18px;
    }

    .form-input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .form-input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--glow-primary), 0 0 20px var(--glow-purple);
    }

    .toggle-password {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 4px;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: var(--text-secondary);
    }

    .toggle-password svg {
      width: 18px;
      height: 18px;
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      background: var(--accent-gradient);
      border: none;
      border-radius: 10px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.35);
    }

    .submit-btn:hover::before {
      opacity: 1;
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Register link */
    .register-row {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .register-row a {
      color: var(--accent-cyan);
      text-decoration: none;
      font-weight: 600;
      margin-left: 4px;
      transition: color 0.2s;
    }

    .register-row a:hover {
      color: #67e8f9;
    }

    /* Error message */
    .error-msg {
      display: none;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #fca5a5;
      text-align: center;
    }

    .error-msg.visible {
      display: block;
      animation: shakeIn 0.4s ease;
    }

    .success-msg {
      display: none;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #86efac;
      text-align: center;
    }

    .success-msg.visible {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes shakeIn {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Footer */
    .login-footer {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-top: 40px;
    }

    .footer-links {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-bottom: 16px;
    }

    .footer-links a {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent-blue);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover {
      color: var(--accent-purple);
    }

    .footer-copy {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .footer-copy .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border-subtle);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .tab-btn.active {
      color: var(--text-primary);
      border-bottom-color: var(--accent-blue);
    }

    .tab-btn:hover:not(.active) {
      color: var(--text-secondary);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 500px) {
      .login-card { padding: 28px 20px; }
      .login-header h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <header class="login-header">
      <h1>Aetheric Ecosystem Login</h1>
      <p class="subtitle">Secure Gateway to Enterprise Tools</p>
    </header>

    <div class="login-card">
      <!-- OAuth Row -->
      <div class="oauth-row">
        <button class="oauth-btn" id="google-btn" onclick="handleGoogleLogin()">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09a6.97 6.97 0 0 1 0-4.17V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>
        <button class="oauth-btn" disabled title="Coming soon">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.989C18.343 21.129 22 16.99 22 12c0-5.523-4.477-10-10-10z"/>
          </svg>
          Facebook
        </button>
      </div>

      <div class="divider"><span>or email</span></div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="login" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" data-tab="register" onclick="switchTab('register')">Create Account</button>
      </div>

      <!-- Error / Success Messages -->
      <div class="error-msg" id="error-msg"></div>
      <div class="success-msg" id="success-msg"></div>

      <!-- Login Tab -->
      <div class="tab-content active" id="tab-login">
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <div class="form-label-row">
              <label class="form-label" for="login-email">Work Email</label>
            </div>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M2 7l10 7 10-7"/></svg>
              </span>
              <input class="form-input" id="login-email" type="email" placeholder="name@company.com" required autocomplete="email" />
            </div>
          </div>
          <div class="form-group">
            <div class="form-label-row">
              <label class="form-label" for="login-password">Password</label>
              <a href="#" class="forgot-link">Forgot?</a>
            </div>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
              </span>
              <input class="form-input" id="login-password" type="password" placeholder="••••••••" required autocomplete="current-password" />
              <button type="button" class="toggle-password" onclick="togglePw('login-password', this)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <button type="submit" class="submit-btn" id="login-submit">Continue to Workspace</button>
        </form>
      </div>

      <!-- Register Tab -->
      <div class="tab-content" id="tab-register">
        <form id="register-form" onsubmit="handleRegister(event)">
          <div class="form-group">
            <div class="form-label-row">
              <label class="form-label" for="reg-name">Full Name</label>
            </div>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>
              </span>
              <input class="form-input" id="reg-name" type="text" placeholder="Your full name" required />
            </div>
          </div>
          <div class="form-group">
            <div class="form-label-row">
              <label class="form-label" for="reg-email">Work Email</label>
            </div>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M2 7l10 7 10-7"/></svg>
              </span>
              <input class="form-input" id="reg-email" type="email" placeholder="name@company.com" required autocomplete="email" />
            </div>
          </div>
          <div class="form-group">
            <div class="form-label-row">
              <label class="form-label" for="reg-password">Password</label>
            </div>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
              </span>
              <input class="form-input" id="reg-password" type="password" placeholder="Minimum 6 characters" required minlength="6" />
              <button type="button" class="toggle-password" onclick="togglePw('reg-password', this)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <button type="submit" class="submit-btn" id="register-submit">Create Account</button>
        </form>
      </div>
    </div>

    <!-- Footer -->
    <footer class="login-footer">
      <div class="footer-links">
        <a href="#">Privacy Policy</a>
        <a href="#">Service Terms</a>
        <a href="#">Status</a>
      </div>
      <div class="footer-copy">
        <span class="dot"></span>
        <span>&copy; 2026 Aetheric Ecosystem Inc.</span>
      </div>
    </footer>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api/auth';

    // Get redirect URL from query params
    function getRedirectUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('redirect') || 'http://localhost:3000';
    }

    // Tab switching
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      document.getElementById(`tab-${tab}`).classList.add('active');
      hideMessages();
    }

    // Show / hide messages
    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('visible');
      document.getElementById('success-msg').classList.remove('visible');
    }

    function showSuccess(msg) {
      const el = document.getElementById('success-msg');
      el.textContent = msg;
      el.classList.add('visible');
      document.getElementById('error-msg').classList.remove('visible');
    }

    function hideMessages() {
      document.getElementById('error-msg').classList.remove('visible');
      document.getElementById('success-msg').classList.remove('visible');
    }

    // Toggle password visibility
    function togglePw(inputId, btn) {
      const input = document.getElementById(inputId);
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      btn.innerHTML = isPassword
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    }

    // Loading state
    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (loading) {
        btn.disabled = true;
        btn.dataset.originalText = btn.textContent;
        btn.innerHTML = '<span class="spinner"></span>Please wait...';
      } else {
        btn.disabled = false;
        btn.textContent = btn.dataset.originalText || 'Submit';
      }
    }

    // Login
    async function handleLogin(e) {
      e.preventDefault();
      hideMessages();
      setLoading('login-submit', true);

      try {
        const res = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value,
          }),
        });

        const data = await res.json();

        if (res.ok && data.success) {
          showSuccess('Login successful! Redirecting...');
          setTimeout(() => {
            window.location.href = getRedirectUrl();
          }, 800);
        } else {
          showError(data.message || 'Login failed.');
        }
      } catch (err) {
        showError('Network error. Please try again.');
      } finally {
        setLoading('login-submit', false);
      }
    }

    // Register
    async function handleRegister(e) {
      e.preventDefault();
      hideMessages();
      setLoading('register-submit', true);

      try {
        const res = await fetch(`${API_BASE}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            name: document.getElementById('reg-name').value,
            email: document.getElementById('reg-email').value,
            password: document.getElementById('reg-password').value,
          }),
        });

        const data = await res.json();

        if (res.ok && data.success) {
          showSuccess('Account created! Redirecting...');
          setTimeout(() => {
            window.location.href = getRedirectUrl();
          }, 800);
        } else {
          showError(data.message || 'Registration failed.');
        }
      } catch (err) {
        showError('Network error. Please try again.');
      } finally {
        setLoading('register-submit', false);
      }
    }

    // Google OAuth
    function handleGoogleLogin() {
      const redirect = getRedirectUrl();
      window.location.href = `${API_BASE}/google?redirect=${encodeURIComponent(redirect)}`;
    }

    // Check if already authenticated
    async function checkAuth() {
      try {
        const res = await fetch(`${API_BASE}/me`, { credentials: 'include' });
        if (res.ok) {
          window.location.href = getRedirectUrl();
        }
      } catch {}
    }
    checkAuth();
  </script>
</body>
</html>
